<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UK Rail Departure Board</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0a0e17;
      color: #e0e0e0;
      padding: 1.5rem;
      min-height: 100vh;
    }

    header {
      margin-bottom: 1rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
    }

    #notification-status {
      display: none;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #90a4ae;
      font-style: italic;
    }

    #alert-banner {
      display: none;
      background: #fff3e0;
      color: #e65100;
      border: 1px solid #ffcc80;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-weight: 500;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      background: #141a2a;
      border-radius: 6px;
    }

    .controls span {
      font-size: 0.9rem;
      color: #b0bec5;
    }

    #refresh-btn {
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    #refresh-btn:hover {
      background: #1976d2;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 6px;
      border: 1px solid #1e293b;
    }

    #departures-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    #departures-table thead {
      background: #1a2236;
    }

    #departures-table th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-weight: 600;
      color: #90caf9;
      border-bottom: 2px solid #263250;
      white-space: nowrap;
    }

    #departures-table td {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid #1e293b;
      white-space: nowrap;
    }

    #departures-table tbody tr:nth-child(even) {
      background: #111827;
    }

    #departures-table tbody tr:nth-child(odd) {
      background: #0d1220;
    }

    #departures-table tbody tr:hover {
      background: #1a2744;
    }

    .status-on-time {
      color: #43a047;
      font-weight: 600;
    }

    .status-delayed {
      color: #f57c00;
      font-weight: 600;
    }

    .status-cancelled {
      color: #e53935;
      font-weight: 600;
    }

    .row-cancelled td {
      color: #e53935;
      text-decoration: line-through;
    }

    #error-message {
      display: none;
      background: #2c1010;
      border: 1px solid #e53935;
      border-radius: 6px;
      color: #ef9a9a;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <header>
    <h1 id="route-title">Loading&hellip;</h1>
    <p id="notification-status">Enable notifications to receive delay alerts</p>
  </header>

  <div id="alert-banner"></div>

  <div class="controls">
    <span>Last updated: <strong id="last-updated">&mdash;</strong></span>
    <span>Next refresh in: <strong id="countdown">15:00</strong></span>
    <button id="refresh-btn">Refresh Now</button>
  </div>

  <div class="table-wrapper">
    <table id="departures-table">
      <thead>
        <tr>
          <th>Departs</th>
          <th>Arrives</th>
          <th>Journey Time</th>
          <th>Platform</th>
          <th>Operator</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="departures-body">
      </tbody>
    </table>
  </div>

  <div id="error-message"></div>

  <script>
    // JavaScript will be added in Phase 6
  </script>
</body>
</html>
